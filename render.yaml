# Render Blueprint for the FastAPI API, Celery worker, Postgres, and Key Value.
# The Next.js app is deployed separately from apps/web on Vercel.

services:
  - type: keyvalue
    name: ops-agent-redis
    plan: starter
    ipAllowList: []
    maxmemoryPolicy: noeviction
    persistenceMode: journal-snapshot

  - type: web
    name: ops-agent-api
    runtime: docker
    plan: starter
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: ./apps/api
    healthCheckPath: /ready
    autoDeployTrigger: checksPass
    envVars:
      - key: APP_ENV
        value: demo
      - key: APP_VERSION
        value: phase-6
      - key: DATABASE_URL
        fromDatabase:
          name: ops-agent-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: ops-agent-redis
          type: keyvalue
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: ops-agent-redis
          type: keyvalue
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: ops-agent-redis
          type: keyvalue
          property: connectionString
      - key: BACKEND_CORS_ORIGINS
        sync: false
      - key: ALLOW_UNSAFE_BOOTSTRAP_SEED
        value: "true"
      - key: DEMO_OPERATOR_TOKEN
        generateValue: true
      - key: EVAL_RUN_TOKEN
        generateValue: true
      - key: DOCUMENT_INGEST_TOKEN
        generateValue: true
      - key: EMBEDDING_PROVIDER
        value: local
      - key: EMBEDDING_MODEL
        value: local-hashing-v1
      - key: LLM_PROVIDER
        value: none
      - key: OBSERVABILITY_PROVIDER
        value: local
      - key: OBSERVABILITY_FULL_PAYLOADS
        value: "false"
      - key: LOG_FORMAT
        value: json
      - key: RATE_LIMIT_MUTATIONS_PER_MINUTE
        value: "10"
      - key: RATE_LIMIT_SEARCH_PER_MINUTE
        value: "60"

  - type: worker
    name: ops-agent-worker
    runtime: docker
    plan: starter
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: ./apps/api
    dockerCommand: ./entrypoint.sh worker
    autoDeployTrigger: checksPass
    maxShutdownDelaySeconds: 120
    envVars:
      - key: APP_ENV
        value: demo
      - key: DATABASE_URL
        fromDatabase:
          name: ops-agent-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: ops-agent-redis
          type: keyvalue
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: ops-agent-redis
          type: keyvalue
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: ops-agent-redis
          type: keyvalue
          property: connectionString
      - key: EMBEDDING_PROVIDER
        value: local
      - key: EMBEDDING_MODEL
        value: local-hashing-v1
      - key: LLM_PROVIDER
        value: none
      - key: OBSERVABILITY_PROVIDER
        value: local
      - key: OBSERVABILITY_FULL_PAYLOADS
        value: "false"
      - key: LOG_FORMAT
        value: json

databases:
  - name: ops-agent-postgres
    plan: basic-256mb
    postgresMajorVersion: "16"
    databaseName: ops_agent
    user: ops_agent
    ipAllowList: []
