services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ops_agent}
      POSTGRES_USER: ${POSTGRES_USER:-ops_agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ops_agent}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api
    environment:
      APP_ENV: ${APP_ENV:-local}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://ops_agent:ops_agent@postgres:5432/ops_agent}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:3000}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-local}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-local-hashing-v1}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      DOCUMENT_INGEST_TOKEN: ${DOCUMENT_INGEST_TOKEN:-}
      EVAL_RUN_TOKEN: ${EVAL_RUN_TOKEN:-}
      DEMO_OPERATOR_TOKEN: ${DEMO_OPERATOR_TOKEN:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-none}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.1}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-1024}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-30}
      OBSERVABILITY_PROVIDER: ${OBSERVABILITY_PROVIDER:-auto}
      OBSERVABILITY_FULL_PAYLOADS: ${OBSERVABILITY_FULL_PAYLOADS:-false}
      OBSERVABILITY_TIMEOUT_SECONDS: ${OBSERVABILITY_TIMEOUT_SECONDS:-2}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_BASE_URL: ${LANGFUSE_BASE_URL:-https://cloud.langfuse.com}
      LANGFUSE_PROJECT_ID: ${LANGFUSE_PROJECT_ID:-}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_ENDPOINT: ${LANGSMITH_ENDPOINT:-https://api.smith.langchain.com}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-ops-agent-local}
      LANGSMITH_WEB_URL: ${LANGSMITH_WEB_URL:-https://smith.langchain.com}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      start_period: 15s
      retries: 5

  worker:
    build:
      context: ./apps/api
    command: ["./entrypoint.sh", "worker"]
    environment:
      APP_ENV: ${APP_ENV:-local}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://ops_agent:ops_agent@postgres:5432/ops_agent}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-local}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-local-hashing-v1}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      DEMO_OPERATOR_TOKEN: ${DEMO_OPERATOR_TOKEN:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-none}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.1}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-1024}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-30}
      OBSERVABILITY_PROVIDER: ${OBSERVABILITY_PROVIDER:-auto}
      OBSERVABILITY_FULL_PAYLOADS: ${OBSERVABILITY_FULL_PAYLOADS:-false}
      OBSERVABILITY_TIMEOUT_SECONDS: ${OBSERVABILITY_TIMEOUT_SECONDS:-2}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_BASE_URL: ${LANGFUSE_BASE_URL:-https://cloud.langfuse.com}
      LANGFUSE_PROJECT_ID: ${LANGFUSE_PROJECT_ID:-}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_ENDPOINT: ${LANGSMITH_ENDPOINT:-https://api.smith.langchain.com}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-ops-agent-local}
      LANGSMITH_WEB_URL: ${LANGSMITH_WEB_URL:-https://smith.langchain.com}
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      disable: true

  web:
    build:
      context: ./apps/web
    environment:
      API_INTERNAL_BASE_URL: ${API_INTERNAL_BASE_URL:-http://api:8000}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
      EVAL_RUN_TOKEN: ${EVAL_RUN_TOKEN:-}
      DEMO_OPERATOR_TOKEN: ${DEMO_OPERATOR_TOKEN:-}
      OPERATOR_UI_ENABLED: ${OPERATOR_UI_ENABLED:-true}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3000/ >/dev/null"]
      interval: 15s
      timeout: 5s
      start_period: 15s
      retries: 5

volumes:
  postgres_data:
