name: E2E

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  EVAL_RUN_TOKEN: e2e-eval-token

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: e2e
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and start services
        run: docker compose up -d --build

      - name: Wait for services to be healthy
        run: |
          for i in $(seq 1 60); do
            unhealthy=$(docker compose ps --format json | jq -r 'select(.Health == "unhealthy") | .Name' 2>/dev/null)
            if [ -n "$unhealthy" ]; then
              echo "Unhealthy containers detected: $unhealthy"
              docker compose ps
              exit 1
            fi
            healthy_count=$(docker compose ps --format json | jq -r 'select(.Health == "healthy") | .Name' 2>/dev/null | wc -l | tr -d ' ')
            if [ "$healthy_count" -ge 4 ]; then
              echo "All expected services are healthy"
              break
            fi
            echo "Waiting for services... ($i/60)"
            sleep 5
          done
          docker compose ps

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Install Playwright browsers
        working-directory: apps/web
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: apps/web
        run: npm run test:e2e

      - name: Print compose logs on failure
        if: failure()
        run: docker compose logs --tail 200

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
